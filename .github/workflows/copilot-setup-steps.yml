name: "Copilot Setup Steps"

on: push

permissions:
  contents: read

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@main
      - name: Install system python deps
        run: sudo apt update && sudo apt install python3-ply python3-pil libjpeg-dev zlib1g-dev
      - name: Get setuptools
        run: pip install --upgrade setuptools
      - name: Install dependencies
        run: pip install ".[dev]"
      - name: Clone Wuhu station set
        run: git clone https://github.com/OpenTTD-China-Set/China-Set-Stations-Wuhu ../China-Set-Stations-Wuhu
