name: Sphinx documentation to GitHub Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install system deps
      run: sudo apt update && sudo apt install libjpeg-dev zlib1g-dev

    - name: Install uv
      uses: astral-sh/setup-uv@v4

    - name: Set up Python 3.12.10
      run: uv python install 3.12.10

    - name: Create virtual environment
      run: uv venv --python 3.12.10

    - name: Install dependencies
      run: uv pip install ".[doc]"

    - name: Build documentation
      run: uv run make doc

    - name: Setup Pages
      uses: actions/configure-pages@v5

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: './docs/_build/html'

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4